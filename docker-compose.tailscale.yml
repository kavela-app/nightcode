# Built-in Tailscale support
# Usage:
#   1. Build with Tailscale: docker compose build --build-arg INSTALL_TAILSCALE=true
#   2. Launch: docker compose -f docker-compose.yml -f docker-compose.tailscale.yml up -d
#   3. Configure in dashboard Settings > Remote Access
services:
  nightcode:
    build:
      args:
        INSTALL_TAILSCALE: "true"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale-state:/var/lib/tailscale

volumes:
  tailscale-state:
