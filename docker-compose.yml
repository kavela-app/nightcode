services:
  nightcode:
    build: .
    container_name: nightcode
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${NIGHTCODE_PORT:-3777}:3777"
    volumes:
      - ./data:/data                                         # SQLite DB + logs
      - ./repos:/repos                                       # Git workspaces
      - ~/.ssh:/home/nightcode/.ssh:ro                       # GitHub SSH keys
      - ~/.config/gh:/home/nightcode/.config/gh               # GitHub CLI auth (for PR creation)
      - nightcode-claude:/home/nightcode/.claude             # Claude Code login (persisted)
    environment:
      - TZ=${TZ:-UTC}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - NIGHTCODE_AUTH_TOKEN=${NIGHTCODE_AUTH_TOKEN:-}
      - KAVELA_API_KEY=${KAVELA_API_KEY:-}
      - NIGHTCODE_MAX_CONCURRENT=${NIGHTCODE_MAX_CONCURRENT:-2}
    env_file:
      - path: .env
        required: false

volumes:
  nightcode-claude:                                          # Survives container rebuilds
